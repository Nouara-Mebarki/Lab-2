<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservations - The Rusty Piston</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="images/logo.png" alt="Logo" width="30" height="30" class="d-inline-block align-top">
                Rusty Piston
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
                    <li class="nav-item"><a class="nav-link" href="reservations.html">Reservations</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <img src="images/img2.jpg" alt="Cozy restaurant booths" class="img-fluid mb-4 rounded">
                
                <!-- Conteneur pour les alertes JS -->
                <div id="alert-container"></div>

                <form id="reservation-form">
                    <div class="mb-3">
                        <input type="text" id="name" placeholder="Name" class="form-control">
                    </div>
                    <div class="mb-3">
                        <input type="text" id="email" placeholder="Email" class="form-control">
                    </div>
                    <div class="mb-3">
                        <select id="party" class="form-select">
                            <option value="">Party Size (1-8)</option>
                            <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                            <option value="4">4</option><option value="5">5</option><option value="6">6</option>
                            <option value="7">7</option><option value="8">8</option>
                        </select>
                    </div>
                    
                    <!-- Ajout des champs requis pour le projet -->
                    <div class="mb-3">
                        <input type="date" id="date" class="form-control">
                    </div>
                    <div class="mb-3">
                        <input type="time" id="time" class="form-control">
                    </div>
                    
                    <fieldset class="mb-3">
                        <legend class="fs-6">Seating Preference</legend>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="seating" id="indoor" value="Indoor">
                            <label class="form-check-label" for="indoor">Indoor</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="seating" id="outdoor" value="Outdoor">
                            <label class="form-check-label" for="outdoor">Outdoor</label>
                        </div>
                    </fieldset>

                    <div class="mb-3">
                        <input type="text" id="notes" placeholder="Dietary notes (optional)" class="form-control">
                    </div>
                    
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="newsletter">
                        <label class="form-check-label" for="newsletter">Subscribe to newsletter</label>
                    </div>

                    <button type="submit" class="btn btn-primary">Submit</button>
                    <button type="reset" class="btn btn-secondary">Reset</button>
                </form>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
